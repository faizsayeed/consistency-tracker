<div class="auth-wrapper">
    <div class="auth-card">
        <h1>Consistency Tracker</h1>
        <p>Track habits, build success</p>
        
        <div ng-show="isLogin" class="form-section">
            <h2>Welcome Back</h2>
            <form ng-submit="submit()">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" ng-model="form.email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" ng-model="form.password" required>
                </div>
                <span class="error-msg" ng-show="errorMsg">{{errorMsg}}</span>
                <button type="submit" class="btn btn-primary">Sign In</button>
            </form>
            <div class="toggle-link">
                Don't have account? <a ng-click="toggleMode()">Sign Up</a>
            </div>
        </div>
        
        <div ng-show="!isLogin" class="form-section">
            <h2>Create Account</h2>
            <form ng-submit="submit()">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" ng-model="form.name" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" ng-model="form.email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" ng-model="form.password" required>
                </div>
                <span class="error-msg" ng-show="errorMsg">{{errorMsg}}</span>
                <button type="submit" class="btn btn-primary">Create Account</button>
            </form>
            <div class="toggle-link">
                Already have account? <a ng-click="toggleMode()">Sign In</a>
            </div>
        </div>
    </div>
</div>
